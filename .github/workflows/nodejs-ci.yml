name: Node.js CI

on:
  push:
    branches: ["main"]
    paths:
      - "CardGame/backend/src/**"
      - "CardGame/backend/tests/**"
      - "CardGame/backend/package.json"
      - "CardGame/backend/package-lock.json"
      - "CardGame/backend/.env.example"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "CardGame/backend/src/**"
      - "CardGame/backend/tests/**"
      - "CardGame/backend/package.json"
      - "CardGame/backend/package-lock.json"
      - "CardGame/backend/.env.example"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    env:
      MONGO_URI: mongodb://127.0.0.1:27017/balatro_test
      TEST_MONGO_URI: mongodb://127.0.0.1:27017/balatro_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: CardGame/backend/package-lock.json

      - name: Load backend CI environment
        working-directory: CardGame/backend
        run: |
          while IFS= read -r line; do
            case "$line" in
              PORT=*|JWT_EXPIRES_IN=*|JWT_REFRESH_SECRET=*|CLIENT_ORIGIN=*|RATE_LIMIT_WINDOW_MS=*|RATE_LIMIT_MAX=*)
                echo "$line" >> "$GITHUB_ENV"
                ;;
            esac
          done < .env.example

      - run: npm ci
        working-directory: CardGame/backend

      - run: npm run lint
        working-directory: CardGame/backend

      - run: npm run test
        working-directory: CardGame/backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
