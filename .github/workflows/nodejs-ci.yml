name: Node.js CI

on:
  push:
    branches: ["main"]
    paths:
      - "CardGame/backend/src/**"
      - "CardGame/backend/tests/**"
      - "CardGame/backend/package.json"
      - "CardGame/backend/package-lock.json"
      - "CardGame/backend/Dockerfile"
      - "CardGame/backend/.env.example"
      - "CardGame/docker-compose.yml"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start backend test stack
        working-directory: CardGame
        run: docker compose up -d --build mongo redis backend

      - name: Run backend tests in Docker
        working-directory: CardGame
        run: docker compose exec -T backend env TEST_MONGO_URI=mongodb://mongo:27017/balatro_test npm test

      - name: Backend logs on failure
        if: failure()
        working-directory: CardGame
        run: docker compose logs --tail=200 backend

      - name: Tear down backend test stack
        if: always()
        working-directory: CardGame
        run: docker compose down -v

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
